version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cloudserve-db
    environment:
      POSTGRES_USER: cloudserve
      POSTGRES_PASSWORD: cloudserve_dev
      POSTGRES_DB: cloudserve
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudserve"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cloudserve-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://cloudserve:cloudserve_dev@db:5432/cloudserve
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
